<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ColorBaby</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Coloring controls">
      
        <section class="control-group" aria-labelledby="category-heading">
          <h2 id="category-heading">Category</h2>
          <div class="segmented" id="categoryList"></div>
        </section>

        

        <section class="control-group" aria-labelledby="picture-heading">
          <h2 id="picture-heading">Picture</h2>
          <div class="picture-grid" id="pictureList"></div>
        </section>

      </aside>

      <section class="stage" aria-label="Coloring canvas">
        <div class="canvas-wrap">
          <section class="control-group" aria-labelledby="color-heading">
            <div class="palette" id="palette"></div>
          </section>
          
          <section class="control-group brush-control" aria-labelledby="brush-heading">
            <input id="brushSize" type="range" min="6" max="42" value="35">
          </section>

          <canvas id="colorCanvas" width="900" height="900" aria-label="Paint on the picture"></canvas>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
