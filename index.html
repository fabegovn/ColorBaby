<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#ff70a6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Color</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <!-- <section class="tools-panel" aria-label="Color and brush controls"> -->
        <!-- <section class="control-group" aria-label="Pick color">
          <div class="palette" id="palette"></div>
        </section> -->
        <section class="tools-panel" aria-label="Color and brush controls">
          <div class="picture-grid" id="palette"></div>
          <input id="brushSize" type="range" min="6" max="100" value="60" hidden>
        </section>
          

        <!-- <section class="control-group brush-control" aria-label="Brush size">
          <input id="brushSize" type="range" min="6" max="50" value="50">
        </section>
      </section> -->

      <section class="paint-stage" aria-label="Coloring canvas">
        <div class="canvas-wrap">
          <canvas id="colorCanvas" width="900" height="900" aria-label="Paint on the picture"></canvas>
        </div>
      </section>

      <section class="gallery-panel" aria-label="Choose picture">
        <div class="picture-grid" id="pictureList"></div>
      </section>
    </main>

    <div class="win-overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle" hidden>
      <div class="win-card">
        <div class="win-stars" aria-hidden="true">⭐ 🎉 ⭐</div>
        <h1 id="winTitle">Great job!</h1>
        <p>You finished the picture!</p>
        <button id="keepPaintingButton" type="button">Keep painting</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
